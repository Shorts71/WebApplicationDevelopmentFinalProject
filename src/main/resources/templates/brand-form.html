<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Brand</title>
    <div th:insert="fragments/base :: assetsHead"></div>
</head>
<body>
<nav th:replace="fragments/navbar :: navbar"></nav>
<div class="container">
    <h1>Add Brand</h1>
    <form th:action="@{/brands/save}" th:object="${brand}" method="post" novalidate>
        <div>
            <label class="form-label">Brand Name</label>
            <input
                    type="text"
                    th:field="*{brandName}"
                    class="form-control"
                    th:classappend="${#fields.hasErrors('brandName') ? 'is-invalid' : ''}"
                    required
            />
            <div class="invalid-feedback"
                 th:if="${#fields.hasErrors('brandName')}"
                 th:errors="*{brandName}">Brand Name Error
            </div>
            <button type="submit" class="btn btn-primary mt-3">Save</button>
        </div>

    </form>
</div>
</body>
</html>
