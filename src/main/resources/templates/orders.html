<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Orders</title>
    <div th:insert="fragments/base :: assetsHead"></div>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
</head>
<body>

<nav th:replace="fragments/navbar :: navbar"></nav>

<div class="container mt-4">

    <h1 class="mb-3">Orders</h1>
    <p class="text-muted mb-3">Orders requested by staff members.</p>

    <a th:href="@{/orders/new}" class="btn btn-success mb-3">Create New Order</a>

    <div class="table-responsive">
        <table id="ordersTable" class="table table-striped table-bordered table-hover">
            <thead>
            <tr>
                <th>ID</th>
                <th>Product</th>
                <th>Price</th>
                <th>Quantity</th>
                <th>Total Amount</th>
                <th>Order Date</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="order : ${orders}">
                <td th:text="${order.id}"></td>
                <td th:text="${#lists.isEmpty(order.items) ? 'N/A' : order.items[0].product.name}"></td>
                <td th:text="${#lists.isEmpty(order.items) ? 'N/A' : order.items[0].product.price}"></td>
                <td th:text="${order.quantity}"></td>
                <td th:text="'$' + ${#numbers.formatDecimal(order.totalAmount,1,2)}"></td>
                <td th:text="${#temporals.format(order.orderDate,'MMM dd, yyyy HH:mm')}"></td>
            </tr>
            </tbody>
        </table>
    </div>

</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script>
    $(document).ready(function () {
        $('#ordersTable').DataTable({
            paging: true,
            searching: true,
            ordering: true
        });
    });
</script>

</body>
</html>
