<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <div th:insert="fragments/base :: assetsHead"></div>
</head>
<body>
<nav th:replace="fragments/navbar :: navbar"></nav>

<div class="container mt-4" style="min-width: 1600px;">

    <h1 class="mb-3">Users</h1>
    <p class="text-muted mb-3">View all users in the warehouse system.</p>

    <a th:href="@{/users/new}" class="btn btn-success mb-3">Add User</a>

    <form method="get" th:action="@{/users}" class="row g-3 mb-3">

        <!-- Search by Product Name/Product Brand -->
        <div class="col-md-3" style="max-width: 150px;">
            <label style="display: block; margin-bottom: 5px; font-weight: 600; font-size: 14px;">
                Users</label>
            <input type="text" name="username" th:value="${username}" class="form-control"
                   placeholder="Search Users">
        </div>

        <!-- Row Count per page -->
        <div class="col-md-3" style="max-width: 150px;">
            <label for="size-select" style="display: block; margin-bottom: 5px; font-weight: 600; font-size: 14px;">Per
                Page</label>
            <select id="size-select" name="size" onchange="this.form.submit();"
                    style="width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 4px;">
                <option value="10" th:selected="${size == 10}">10</option>
                <option value="25" th:selected="${size == 25}">25</option>
                <option value="50" th:selected="${size == 50}">50</option>
                <option value="100" th:selected="${size == 100}">100</option>
            </select>
        </div>

        <!-- Filter by Stock Count -->
        <div class="col-md-3" style="max-width: 150px;">
            <label for="filter-select" style="display: block; margin-bottom: 5px; font-weight: 600; font-size: 14px;">Filter
                By</label>
            <select id="filter-select" name="filterType" onchange="this.form.submit();"
                    style="width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 4px;">
                <option value="all" th:selected="${filterType == 'all'}">All Users</option>
                <option value="STAFF" th:selected="${filterType == 'STAFF'}">Staff</option>
                <option value="MANAGER" th:selected="${filterType == 'MANAGER'}">Manager</option>
                <option value="ADMIN" th:selected="${filterType == 'ADMIN'}">Admin</option>
            </select>
        </div>

        <!-- Oldest/Newest -->
        <div class="col-md-3" style="max-width: 150px;">
            <label for="direction-select"
                   style="display: block; margin-bottom: 5px; font-weight: 600; font-size: 14px;">Direction</label>
            <select id="direction-select" name="sortDir" onchange="this.form.submit();"
                    style="width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 4px;">
                <option value="ASC" th:selected="${sortDir == 'ASC'}">Ascending</option>
                <option value="DESC" th:selected="${sortDir == 'DESC'}">Descending</option>
            </select>
        </div>

        <!-- Search and Reset -->
        <div class="col-md-3">
            <a th:href="@{/users}" class="btn btn-secondary">Reset Filters</a>
        </div>

    </form>

    <table class="table table-striped table-bordered" style="table-layout: fixed;">
        <thead>
        <tr>
            <th style="width: 10%">
                <a th:href="@{/users(
                               page=${currentPage},
                               size=${size},
                               sortField='userId',
                               sortDir=${sortField=='userId' && sortDir=='ASC' ? 'DESC' : 'ASC'},
                               username=${username},
                               filterType=${filterType}
                               )}">
                    ID
                </a>
                <span th:text="${sortField=='userId' ? (sortDir=='DESC' ? '↓' : '↑') : ''}"></span>
            </th>

            <th style="width: 30%">
                <a th:href="@{/users(
                               page=${currentPage},
                               size=${size},
                               sortField='username',
                               sortDir=${sortField=='username' && sortDir=='ASC' ? 'DESC' : 'ASC'},
                               username=${username},
                               filterType=${filterType}
                               )}">
                    Username
                </a>
                <span th:text="${sortField=='username' ? (sortDir=='DESC' ? '↓' : '↑') : ''}"></span>
            </th>

            <th style="width: 30%">
                <a th:href="@{/users(
                               page=${currentPage},
                               size=${size},
                               sortField='email',
                               sortDir=${sortField=='email' && sortDir=='ASC' ? 'DESC' : 'ASC'},
                               username=${username},
                               filterType=${filterType}
                               )}">
                    Email
                </a>
                <span th:text="${sortField=='email' ? (sortDir=='DESC' ? '↓' : '↑') : ''}"></span>
            </th>
            <th style="width: 30%">
                <a th:href="@{/users(
                               page=${currentPage},
                               size=${size},
                               sortField='role',
                               sortDir=${sortField=='role' && sortDir=='ASC' ? 'DESC' : 'ASC'},
                               username=${username},
                               filterType=${filterType}
                               )}">
                    Role
                </a>
                <span th:text="${sortField=='role' ? (sortDir=='DESC' ? '↓' : '↑') : ''}"></span>
            </th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="user : ${userPage.content}">
            <td th:text="${user.userId}"></td>
            <td th:text="${user.username}"></td>
            <td th:text="${user.email}"></td>
            <td th:text="${user.role}"></td>
        </tr>
        </tbody>
    </table>

    <nav th:if="${totalPages > 1}">
        <ul class="pagination">
            <li class="page-item" th:classappend="${currentPage==0} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/users(page=${currentPage-1},size=${size},sortField=${sortField},sortDir=${sortDir},username=${username},filterType=${filterType})}">
                    Previous
                </a>
            </li>

            <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages-1)}"
                th:classappend="${i==currentPage}? 'active'">
                <a class="page-link"
                   th:href="@{/users(page=${i},size=${size},sortField=${sortField},sortDir=${sortDir},username=${username},filterType=${filterType})}"
                   th:text="${i+1}"></a>
            </li>

            <li class="page-item" th:classappend="${currentPage+1>=totalPages}? 'disabled'">
                <a class="page-link"
                   th:href="@{/users(page=${currentPage+1},size=${size},sortField=${sortField},sortDir=${sortDir},username=${username},filterType=${filterType})}">
                    Next
                </a>
            </li>
        </ul>
    </nav>

</div>
</body>
</html>
