<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Create Order - TSAS Warehouse Manager</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container">

    <h1 class="page-title">Create Order</h1>
    <p class="subtitle">Use this form to create a new order.</p>

    <!-- Thymeleaf form -->
    <form th:action="@{/orders/save}" method="post" th:object="${order}">

        <div class="form-group">
            <label for="product">Select Product</label>

            <select id="product"
                    class="form-control"
                    th:field="*{product.id}">

                <option value="">Select a product</option>

                <option th:each="product : ${products}"
                        th:value="${product.id}"
                        th:text="${product.name}">
                </option>

            </select>

        </div>

        <div class="form-group">
            <label for="quantity">Quantity</label>

            <input type="number"
                   id="quantity"
                   class="form-control"
                   th:field="*{quantity}">
        </div>

        <button type="submit" class="btn">Add to Order</button>

    </form>

</div>

</body>
</html>
