<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Brands</title>

    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
</head>
<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-4">

    <h1 class="mb-3">Brands</h1>
    <p class="text-muted mb-3">Popular brands included in the warehouse system.</p>

    <a th:href="@{/brands/new}" class="btn btn-success mb-3">Add Brand</a>

    <div class="table-responsive">
        <table id="brandsTable" class="table table-striped table-bordered table-hover">
            <thead>
            <tr>
                <th>Brand ID</th>
                <th>Brand Name</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="brand : ${brands}">
                <td th:text="${brand.id}"></td>
                <td th:text="${brand.brandName}"></td>
            </tr>
            </tbody>
        </table>
    </div>

</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script>
$(document).ready(function () {
    $('#brandsTable').DataTable({
        paging: true,
        searching: true,
        ordering: true
    });
});
</script>

</body>
</html>
