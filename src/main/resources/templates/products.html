<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Products</title>
    <div th:insert="fragments/base :: assetsHead"></div>
</head>
<body>

<nav th:replace="fragments/navbar :: navbar"></nav>

<div class="container mt-4">

    <h1 class="mb-3">Products</h1>
    <p class="text-muted mb-3">View all products in the warehouse system.</p>

    <a th:href="@{/products/new}" class="btn btn-success mb-3">Add Product</a>

    <!-- Filter Form -->
    <form method="get" th:action="@{/products}" class="row g-3 mb-3">
        <div class="col-md-3">
            <input type="text" name="name" th:value="${nameFilter}" class="form-control"
                   placeholder="Search Product Name">
        </div>
        <div class="col-md-3">
            <input type="text" name="brand" th:value="${brandFilter}" class="form-control" placeholder="Search Brand">
        </div>
        <div class="col-md-3">
            <button type="submit" class="btn btn-primary">Filter</button>
            <a th:href="@{/products}" class="btn btn-secondary">Reset</a>
        </div>
    </form>

    <table class="table table-striped table-bordered">
        <thead>
        <tr>
            <!-- Sorting links -->
            <th>
                <a th:href="@{/products(
                                page=${currentPage},
                                size=10,
                                sortField='name',
                                sortDir=${sortField=='name' && sortDir=='asc'?'desc':'asc'},
                                brand=${brandFilter},
                                name=${nameFilter})}">
                    Product
                    <span th:text="${sortField=='name' ? (sortDir=='asc' ? '↑' : '↓') : ''}"></span>
                </a>
            </th>
            <th>
                <a th:href="@{/products(
                                page=${currentPage},
                                size=10,
                                sortField='brand.brandName',
                                sortDir=${sortField=='brand.brandName' && sortDir=='asc'?'desc':'asc'},
                                brand=${brandFilter},
                                name=${nameFilter})}">
                    Brand
                    <span th:text="${sortField=='brand.brandName' ? (sortDir=='asc' ? '↑' : '↓') : ''}"></span>
                </a>
            </th>
            <th>Price</th>
            <th>Description</th>
            <th>Stock</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="product : ${productPage.getContent()}">
            <td th:text="${product.name}"></td>
            <td th:text="${product.brand != null ? product.brand.brandName : 'N/A'}"></td>
            <td th:text="${product.price}"></td>
            <td th:text="${product.description}"></td>
            <td th:text="${product.stockCount}"></td>
        </tr>
        </tbody>
    </table>

    <!-- Pagination -->
    <nav th:if="${totalPages > 1}">
        <ul class="pagination">
            <li class="page-item" th:classappend="${currentPage==0} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/products(page=${currentPage-1},size=10,sortField=${sortField},sortDir=${sortDir},brand=${brandFilter},name=${nameFilter})}">
                    Previous
                </a>
            </li>

            <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages-1)}"
                th:classappend="${i==currentPage}? 'active'">
                <a class="page-link"
                   th:href="@{/products(page=${i},size=10,sortField=${sortField},sortDir=${sortDir},brand=${brandFilter},name=${nameFilter})}"
                   th:text="${i+1}"></a>
            </li>

            <li class="page-item" th:classappend="${currentPage+1>=totalPages}? 'disabled'">
                <a class="page-link"
                   th:href="@{/products(page=${currentPage+1},size=10,sortField=${sortField},sortDir=${sortDir},brand=${brandFilter},name=${nameFilter})}">
                    Next
                </a>
            </li>
        </ul>
    </nav>

</div>

</body>
</html>
