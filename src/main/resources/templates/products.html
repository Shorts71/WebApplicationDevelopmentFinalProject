<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http:www.thymeleaf.org/extra/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Products</title>
    <div th:insert="fragments/base :: assetsHead"></div>
</head>
<body>

<nav th:replace="fragments/navbar :: navbar"></nav>

<div class="container mt-4" style="min-width: 1600px;">

    <h1 class="mb-3">Products</h1>
    <p class="text-muted mb-3">View all products in the warehouse system.</p>

    <a sec:authorize="hasRole('ADMIN')" th:href="@{/products/new}" class="btn btn-success mb-3">Add Product</a>

    <!-- Filter Form -->
    <form method="get" th:action="@{/products}" class="row g-3 mb-3">

        <!-- Search by Product Name/Product Brand -->
        <div class="col-md-3" style="max-width: 150px;">
            <label for="size-select" style="display: block; margin-bottom: 5px; font-weight: 600; font-size: 14px;">
                Product Name</label>
            <input type="text" name="name" th:value="${nameFilter}" class="form-control"
                   placeholder="Search Product Name">
        </div>
        <div class="col-md-3" style="max-width: 150px;">
            <label for="size-select" style="display: block; margin-bottom: 5px; font-weight: 600; font-size: 14px;">
                Brand Name</label>
            <input type="text" name="brand" th:value="${brandFilter}" class="form-control" placeholder="Search Brand">
        </div>

        <!-- Row Count per page -->
        <div class="col-md-3" style="max-width: 150px;">
            <label for="size-select" style="display: block; margin-bottom: 5px; font-weight: 600; font-size: 14px;">Per
                Page</label>
            <select id="size-select" name="size" onchange="this.form.submit();"
                    style="width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 4px;">
                <option value="10" th:selected="${size == 10}">10</option>
                <option value="25" th:selected="${size == 25}">25</option>
                <option value="50" th:selected="${size == 50}">50</option>
                <option value="100" th:selected="${size == 100}">100</option>
            </select>
        </div>

        <!-- Filter by Stock Count -->
        <div class="col-md-3" style="max-width: 150px;">
            <label for="filter-select" style="display: block; margin-bottom: 5px; font-weight: 600; font-size: 14px;">Filter
                By</label>
            <select id="filter-select" name="filterType" onchange="this.form.submit();"
                    style="width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 4px;">
                <option value="all" th:selected="${filterType == 'all'}">All Products</option>
                <option value="low" th:selected="${filterType == 'low'}">Low Stock Count</option>
                <option value="average" th:selected="${filterType == 'average'}">Average Stock Count</option>
                <option value="high" th:selected="${filterType == 'high'}">High Stock Count</option>
            </select>
        </div>

        <!-- Oldest/Newest -->
        <div class="col-md-3" style="max-width: 150px;">
            <label for="direction-select"
                   style="display: block; margin-bottom: 5px; font-weight: 600; font-size: 14px;">Direction</label>
            <select id="direction-select" name="sortDir" onchange="this.form.submit();"
                    style="width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 4px;">
                <option value="ASC" th:selected="${sortDir == 'ASC'}">Ascending</option>
                <option value="DESC" th:selected="${sortDir == 'DESC'}">Descending</option>
            </select>
        </div>

        <!-- Search and Reset -->
        <div class="col-md-3">
            <a th:href="@{/products}" class="btn btn-secondary">Reset Filters</a>
        </div>
    </form>

    <table class="table table-striped table-bordered" style="table-layout: fixed;">
        <thead>
        <tr>
            <!-- Sorting links -->
            <th style="width: 20%;">
                <a th:href="@{/products(
                                page=${currentPage},
                                size=${size},
                                sortField='name',
                                sortDir=${sortField=='name' && sortDir=='DESC'?'ASC':'DESC'},
                                brand=${brandFilter},
                                name=${nameFilter},
                                filterType=${filterType})}">
                    Product
                    <span th:text="${sortField=='name' ? (sortDir=='DESC' ? '↓' : '↑') : ''}"></span>
                </a>
            </th>
            <th style="width: 20%;">
                <a th:href="@{/products(
                                page=${currentPage},
                                size=${size},
                                sortField='brand.brandName',
                                sortDir=${sortField=='brand.brandName' && sortDir=='DESC'?'ASC':'DESC'},
                                brand=${brandFilter},
                                name=${nameFilter},
                                filterType=${filterType})}">
                    Brand
                    <span th:text="${sortField=='brand.brandName' ? (sortDir=='DESC' ? '↓' : '↑') : ''}"></span>
                </a>
            </th>
            <th style="width: 10%;">
                <a th:href="@{/products(
                                page=${currentPage},
                                size=${size},
                                sortField='price',
                                sortDir=${sortField=='price' && sortDir=='DESC'?'ASC':'DESC'},
                                brand=${brandFilter},
                                name=${nameFilter},
                                filterType=${filterType})}">
                    Price
                    <span th:text="${sortField=='price' ? (sortDir=='DESC' ? '↓' : '↑') : ''}"></span>
                </a>
            </th>
            <th style="width: 40%;">
                <a th:href="@{/products(
                                page=${currentPage},
                                size=${size},
                                sortField='description',
                                sortDir=${sortField=='description' && sortDir=='DESC'?'ASC':'DESC'},
                                brand=${brandFilter},
                                name=${nameFilter},
                                filterType=${filterType})}">
                    Description
                    <span th:text="${sortField=='description' ? (sortDir=='DESC' ? '↓' : '↑') : ''}"></span>
                </a>
            </th>
            <th style="width: 10%;">
                <a th:href="@{/products(
                                page=${currentPage},
                                size=${size},
                                sortField='stockCount',
                                sortDir=${sortField=='stockCount' && sortDir=='DESC'?'ASC':'DESC'},
                                brand=${brandFilter},
                                name=${nameFilter},
                                filterType=${filterType})}">
                    Stock Count
                    <span th:text="${sortField=='stockCount' ? (sortDir=='DESC' ? '↓' : '↑') : ''}"></span>
                </a>
            </th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="product : ${productPage.getContent()}">
            <td th:text="${product.name}"></td>
            <td th:text="${product.brand != null ? product.brand.brandName : 'N/A'}"></td>
            <td th:text="'$' + ${#numbers.formatDecimal(product.price, 1, 2)}"></td>
            <td th:text="${product.description}"></td>
            <td th:text="${product.stockCount}"></td>
        </tr>
        </tbody>
    </table>

    <!-- Pagination -->
    <nav th:if="${totalPages > 1}">
        <ul class="pagination">
            <li class="page-item" th:classappend="${currentPage==0} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/products(page=${currentPage-1},size=${size},sortField=${sortField},sortDir=${sortDir},brand=${brandFilter},name=${nameFilter}, filterType=${filterType})}">
                    Previous
                </a>
            </li>

            <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages-1)}"
                th:classappend="${i==currentPage}? 'active'">
                <a class="page-link"
                   th:href="@{/products(page=${i},size=${size},sortField=${sortField},sortDir=${sortDir},brand=${brandFilter},name=${nameFilter}, filterType=${filterType})}"
                   th:text="${i+1}"></a>
            </li>

            <li class="page-item" th:classappend="${currentPage+1>=totalPages}? 'disabled'">
                <a class="page-link"
                   th:href="@{/products(page=${currentPage+1},size=${size},sortField=${sortField},sortDir=${sortDir},brand=${brandFilter},name=${nameFilter}, filterType=${filterType})}">
                    Next
                </a>
            </li>
        </ul>
    </nav>

</div>

</body>
</html>
