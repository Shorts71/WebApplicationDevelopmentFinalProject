<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Product</title>

    <!-- CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-4">

    <h1 class="mb-3">Add Product</h1>
    <p class="text-muted mb-4">Use this form to add a new product to the warehouse.</p>

    <form th:action="@{/products/save}" method="post" th:object="${product}" class="needs-validation" novalidate>

        <div class="mb-3">
            <label class="form-label">Name</label>
            <input type="text" th:field="*{name}" class="form-control" placeholder="Enter product name" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Price</label>
            <input type="number" th:field="*{price}" class="form-control" step="0.01" placeholder="Enter price" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea th:field="*{description}" class="form-control" rows="3" placeholder="Enter description"></textarea>
        </div>

        <div class="mb-3">
            <label class="form-label">Brand</label>
            <select th:field="*{brand.id}" class="form-select" required>
                <option value="">Select Brand</option>
                <option th:each="brand : ${brands}" th:value="${brand.id}" th:text="${brand.brandName}"></option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Stock Count</label>
            <input type="number" th:field="*{stockCount}" class="form-control" placeholder="Enter stock count" required>
        </div>

        <button type="submit" class="btn btn-primary">Save Product</button>
        <a th:href="@{/products}" class="btn btn-secondary ms-2">Cancel</a>

    </form>

</div>

</body>
</html>
