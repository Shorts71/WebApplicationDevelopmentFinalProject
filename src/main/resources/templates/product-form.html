<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Create Product</title>
    <div th:insert="fragments/base :: assetsHead"></div>
</head>
<body>

<nav th:replace="fragments/navbar :: navbar"></nav>

<div class="container mt-4">

    <h1 class="mb-3">Add Product</h1>
    <p class="text-muted mb-4">Use this form to add a new product to the warehouse.</p>

    <form th:action="@{/products/save}" method="post" th:object="${product}" class="needs-validation" novalidate>

        <div class="mb-3">
            <label class="form-label">Name</label>
            <input
                    type="text"
                    th:field="*{name}"
                    class="form-control"
                    placeholder="Enter product name"
                    th:classappend="${#fields.hasErrors('name') ? 'is-invalid' : '' }"
                    required
            >
            <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Price</label>
            <input
                    type="number"
                    th:field="*{price}"
                    class="form-control"
                    step="0.01"
                    placeholder="Enter price"
                    th:classappend="${#fields.hasErrors('price') ? 'is-invalid' : '' }"
                    required
            >
            <div class="invalid-feedback" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea
                    th:field="*{description}"
                    class="form-control"
                    rows="3"
                    placeholder="Enter description"
                    th:classappend="${#fields.hasErrors('description') ? 'is-invalid' : '' }"
            >

            </textarea>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Brand</label>
            <select
                    th:field="*{brand}"
                    class="form-select"
                    required
                    th:classappend="${#fields.hasErrors('brand') ? 'is-invalid' : '' }"
            >
                <option value="">Select Brand</option>
                <option th:each="brand : ${brands}" th:value="${brand.id}" th:text="${brand.brandName}"></option>
            </select>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('brand')}" th:errors="*{brand}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Stock Count</label>
            <input
                    type="number"
                    th:field="*{stockCount}"
                    class="form-control"
                    placeholder="Enter stock count"
                    th:classappend="${#fields.hasErrors('stockCount') ? 'is-invalid' : '' }"
                    required
            >
            <div class="invalid-feedback" th:if="${#fields.hasErrors('stockCount')}" th:errors="*{stockCount}"></div>
        </div>

        <button type="submit" class="btn btn-primary">Save Product</button>
        <a th:href="@{/products}" class="btn btn-secondary ms-2">Cancel</a>

    </form>

</div>

</body>
</html>
